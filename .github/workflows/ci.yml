name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        working-directory: ./backend
        run: npm ci --include=dev
              
      - name: Correr ESLint
        working-directory: ./backend
        run: npm run lint

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm ci

      - name: Correr ESLint
        working-directory: ./frontend
        run: npm run lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: camunda
          POSTGRES_PASSWORD: camunda
          POSTGRES_DB: camunda
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PORT: 5000
      DATABASE_URL: postgresql://baths_user:baths_password@127.0.0.1:5432/baths_app?schema=public
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: baths_app
      DB_USER: baths_user
      DB_PASSWORD: baths_password
      DB_ADMIN_URL: postgresql://camunda:camunda@127.0.0.1:5432/camunda
      DB_ADMIN_HOST: 127.0.0.1
      DB_ADMIN_PORT: 5432
      DB_ADMIN_DATABASE: camunda
      DB_ADMIN_USER: camunda
      DB_ADMIN_PASSWORD: camunda
      DB_WAIT_MAX_ATTEMPTS: 60
      DB_WAIT_DELAY_MS: 1000

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        working-directory: ./backend
        run: npm ci --include=dev

      - name: Preparar base de dados
        working-directory: ./backend
        run: node src/db/prepareDatabases.js

      - name: Aguardar base de dados
        working-directory: ./backend
        run: node src/db/waitForDb.js

      - name: Baseline Prisma
        working-directory: ./backend
        run: node src/db/baselinePrisma.js

      - name: Correr migracoes
        working-directory: ./backend
        run: npx prisma migrate deploy

      - name: Gerar Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Correr seed
        working-directory: ./backend
        run: npm run db:seed

      - name: Correr testes
        working-directory: ./backend
        run: npx jest --runInBand

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm ci

      - name: Correr testes
        working-directory: ./frontend
        run: npm test
        env:
          CI: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false